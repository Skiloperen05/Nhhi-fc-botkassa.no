name: Keep Supabase active

on:
  schedule:
    - cron: '17 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping production site
        run: |
          curl --fail --silent --show-error --location --max-time 30 \
            https://nhhi-fc-botkassa.no \
            > /dev/null

      - name: Ping Supabase API
        env:
          SUPABASE_URL: https://qnwjhheoekpqqqhevztw.supabase.co
          SUPABASE_PUBLISHABLE_KEY: sb_publishable_RqAMOlXY2TK012WTAyw3Yw_Js1VYXpz
        run: |
          curl --fail --silent --show-error --location --max-time 30 \
            "$SUPABASE_URL/rest/v1/public_decks?select=id&limit=1" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY" \
            > /dev/null

      - name: Check out repository for monthly keepalive commit
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4

      - name: Keep scheduled workflow enabled
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%d)" != "01" ] || [ "$(date -u +%H)" != "06" ]; then
            exit 0
          fi

          date -u +%Y-%m-%dT%H:%M:%SZ > .github/keep-supabase-awake.last-run
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keep-supabase-awake.last-run
          git commit -m "Keep Supabase wakeup workflow enabled" || exit 0
          git push
